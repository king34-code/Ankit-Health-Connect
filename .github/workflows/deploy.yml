name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd artifacts/ankit-health && pnpm install --no-frozen-lockfile
      - run: cd artifacts/ankit-health && PORT=3000 npx vite build --base=/Ankit-Health-Connect/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./artifacts/ankit-health/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
